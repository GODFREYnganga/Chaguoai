<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Registration - Contraception DSS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="card">
            <div class="brand-header">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                </svg>
                <h1>Provider Application</h1>
                <p>Contraception Decision Support System</p>
            </div>

            <div id="alert-box" class="alert" style="display: none;"></div>

            <form id="provider-register-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="Dr. Jane Doe or John Smith">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="jane@clinic.com">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" required placeholder="+254712345678">
                </div>

                <div class="form-group">
                    <label for="role">Role / Specialization</label>
                    <select id="role" name="role" required>
                        <option value="" disabled selected>Select your role...</option>
                        <option value="chw">Community Health Worker (CHW)</option>
                        <option value="clinician">Clinician (Doctor / Nurse)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="credentials">Credentials / Medical License Number</label>
                    <input type="text" id="credentials" name="credentials" required placeholder="e.g. KMPDC-12345 or CHW Id">
                </div>

                <div class="form-group">
                    <label for="password">Create Secret Password</label>
                    <input type="password" id="password" name="password" required placeholder="Minimum 8 characters">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Submit Application</button>
            </form>

            <p class="text-center" style="margin-top: 1.5rem; font-size: 0.875rem;">
                Already approved? <a href="/provider/login" style="color: var(--primary); text-decoration: none; font-weight: 500;">Login here</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('provider-register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const alertBox = document.getElementById('alert-box');
            
            btn.disabled = true;
            btn.textContent = 'Submitting...';
            alertBox.style.display = 'none';

            const payload = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                role: document.getElementById('role').value,
                credentials: document.getElementById('credentials').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('/api/provider/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    alertBox.className = 'alert alert-success';
                    alertBox.textContent = 'Application submitted successfully! Please wait for administrator approval.';
                    alertBox.style.display = 'block';
                    e.target.reset();
                } else {
                    throw new Error(data.error || 'Registration failed');
                }
            } catch (err) {
                alertBox.className = 'alert alert-error';
                alertBox.textContent = err.message;
                alertBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Submit Application';
            }
        });
    </script>
</body>
</html>
